  password: ""
  apks: []
  server:
    tcp_forwarding: false
panel_icon: mdi:console
panel_title: Terminal
ports:
  22/tcp: null
schema:
  authorized_keys:
    - str
  password: password
  apks:
    - str
  server:
    tcp_forwarding: bool
