---
version: 2.12.1-2
slug: zigbee2mqtt
image: registry.apexinfosys.in/apexos/{arch}-addon-zigbee2mqtt
name: Zigbee2MQTT
description: Use your ZigBee devices without the vendor's bridge or gateway
url: https://github.com/apexinfosysindia/addons/tree/main/zigbee2mqtt
arch:
  - aarch64
  - amd64
breaking_versions:
  - 2.0.0-1
uart: true
udev: true
startup: application
boot: auto
init: false
ingress: true
timeout: 30
panel_icon: mdi:zigbee
apexos_api: true
services:
  - mqtt:need
map:
  - type: share
    read_only: false
  - type: apexos_config
    read_only: false
    path: /config
  - type: addon_config
    read_only: false
    path: /addon_config
ports:
  8485/tcp: 8485
  8099/tcp: null
ports_description:
  8485/tcp: Socat tcp-listen port
  8099/tcp: Frontend tcp-listen port
options:
  data_path: /config/zigbee2mqtt
  socat:
    enabled: false
    master: pty,raw,echo=0,link=/tmp/ttyZ2M,mode=777
    slave: tcp-listen:8485,keepalive,nodelay,reuseaddr,keepidle=1,keepintvl=1,keepcnt=5
    options: "-d -d"
    log: false
  mqtt: {}
  serial: {}
schema:
  data_path: str
  socat:
    enabled: bool?
    master: str?
    slave: str?
    options: str?
    log: bool?
  mqtt:
    server: str?
    ca: str?
    key: str?
    cert: str?
    user: str?
    password: str?
    base_topic: str?
  serial:
    port: str?
    adapter: match(zstack|deconz|zigate|ezsp|ember|zboss)?
    baudrate: int?
    rtscts: bool?
  watchdog: str?
  force_onboarding: bool?
