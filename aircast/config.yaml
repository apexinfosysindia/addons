---
version: 5.1.1
slug: aircast
name: AirCast
description: AirPlay capabilities for your Chromecast devices.
url: https://github.com/apexinfosysindia/addons/tree/main/aircast
arch:
  - aarch64
  - amd64
apexos_api: true
host_network: true
init: false
map:
  - addon_config:rw
  - apexos_config:rw
options:
  latency_rtp: 0
  latency_http: 0
  drift: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  address: str?
  latency_rtp: int
  latency_http: int
  drift: bool
startup: services
