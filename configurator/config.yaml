---
version: 6.0.0
slug: configurator
image: registry.apexinfosys.in/apexos/{arch}-addon-configurator
name: File editor
description: Simple browser-based file editor for ApexOS
url: https://github.com/apexinfosysindia/addons/tree/main/configurator
arch:
  - aarch64
  - amd64
apexos_api: true
ingress: true
init: false
map:
  - all_addon_configs:rw
  - backup:rw
  - apexos_config:rw
  - media:rw
  - share:rw
  - ssl:rw
options:
  dirsfirst: false
  enforce_basepath: true
  git: true
  ignore_pattern:
    - __pycache__
    - .cloud
    - .storage
    - deps
  ssh_keys: []
panel_icon: mdi:wrench
schema:
  dirsfirst: bool
  enforce_basepath: bool
  git: bool
  ignore_pattern:
    - str
  ssh_keys:
    - str
