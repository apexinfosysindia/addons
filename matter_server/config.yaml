---
version: 9.1.0
breaking_versions: [9.0.0]
slug: matter_server
name: Matter Server
description: Matter WebSocket Server for ApexOS Matter support.
url: https://github.com/apexinfosysindia/addons/tree/main/matter_server
arch:
  - aarch64
  - amd64
discovery:
  - matter
apexos_api: true
# IPC is only used within the add-on
host_ipc: false
host_network: true
host_dbus: true
ingress: true
ingress_port: 5580
init: false
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
  beta: false
  enable_test_net_dcl: false
  time_sync: auto
schema:
  log_level: list(debug|info|notice|warn|error|fatal|verbose|warning|critical)
  beta: bool?
  enable_test_net_dcl: bool?
  time_sync: list(auto|on|off)
  default_fabric_label: match(^.{1,32}$)?
  ble_proxy: bool?
  bluetooth_adapter_id: int?
  matter_server_args:
    - str?
  matter_server_env_vars:
    - match(^[A-Za-z_][A-Za-z0-9_]*=.*$)?
  matter_server_version: str?
ports:
  5580/tcp: null
stage: stable
startup: services
