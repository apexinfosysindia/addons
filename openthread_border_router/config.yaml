---
version: 3.0.2
breaking_versions: [3.0.0]
slug: openthread_border_router
name: OpenThread Border Router
description: OpenThread Border Router app
url: https://github.com/apexinfosysindia/addons/tree/main/openthread_border_router
arch:
  - aarch64
  - amd64
gpio: true
apexos_api: true
discovery:
  - otbr
# IPC is only used within the add-on
host_ipc: false
host_network: true
host_uts: true
privileged:
  - IPC_LOCK
  - NET_ADMIN
devices:
  - /dev/net/tun
init: false
options:
  device: null
  baudrate: "460800"
  flow_control: true
  otbr_log_level: notice
  firewall: true
  nat64: false
  beta: false
ports:
  8080/tcp: null
  8081/tcp: null
ports_description:
  8080/tcp: OpenThread Web port
  8081/tcp: OpenThread REST API port
schema:
  device: device(subsystem=tty)
  baudrate: list(57600|115200|230400|460800|921600|1000000)
  flow_control: bool
  backbone_interface: str?
  network_device: str?
  otbr_log_level: list(debug|info|notice|warning|error|critical|alert|emergency)
  firewall: bool
  nat64: bool
  beta: bool?
startup: services
