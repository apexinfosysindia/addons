---
version: 6.0.1
slug: vscode
image: registry.apexinfosys.in/apexos/{arch}-addon-vscode
name: Studio Code Server
description: Fully featured Visual Studio Code (VSCode) experience integrated in the ApexOS frontend.
url: https://github.com/apexinfosysindia/addons/tree/main/vscode
ingress: true
ingress_port: 1337
ingress_stream: true
panel_icon: mdi:microsoft-visual-studio-code
startup: services
init: false
arch:
  - aarch64
  - amd64
uart: true
apexos_api: true
apexos_role: manager
map:
  - type: addons
    read_only: false
  - type: all_addon_configs
    read_only: false
  - type: backup
    read_only: false
  - type: apexos_config
    read_only: false
    path: /config
  - type: media
    read_only: false
  - type: share
    read_only: false
  - type: ssl
    read_only: false
services:
  - mysql:want
  - mqtt:want
options:
  packages: []
  init_commands: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  config_path: str?
  packages:
    - str
  init_commands:
    - str
